<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot UI</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b1220; color: #e8edf7; margin: 0; padding: 0; }
    .app { max-width: 800px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 12px; font-size: 24px; }
    .chat { margin-top: 16px; border-radius: 12px; background: rgba(255,255,255,0.04); padding: 16px; min-height: 320px; }
    .message { margin-bottom: 12px; display: flex; gap: 10px; }
    .message .bubble { padding: 12px 14px; border-radius: 14px; max-width: 85%; line-height: 1.5; }
    .message.user .bubble { background: rgba(60, 148, 252, 0.22); align-self: flex-end; }
    .message.assistant .bubble { background: rgba(255, 255, 255, 0.12); }
    .message .role { font-size: 12px; opacity: 0.75; margin-bottom: 4px; }
    .controls { display: flex; gap: 10px; margin-top: 16px; }
    textarea { flex: 1; min-height: 60px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.35); color: #f5f7ff; padding: 10px; resize: vertical; }
    button { background: linear-gradient(90deg, #7c5cff, #1fb6ff); border: none; border-radius: 10px; color: #fff; font-weight: 600; padding: 12px 18px; cursor: pointer; transition: transform 0.12s ease, filter 0.12s ease; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    footer { margin-top: 32px; font-size: 12px; opacity: 0.75; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Chatbot</h1>
    <div class="chat" id="chat"></div>

    <div class="controls">
      <textarea id="input" placeholder="Ask something..." aria-label="Ask something"></textarea>
      <button id="send">Send</button>
    </div>

    <footer>Powered by your Project Agent API. Use the /api/chat endpoint for integrations.</footer>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    const messages = [];

    function addMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const roleLabel = document.createElement('div');
      roleLabel.className = 'role';
      roleLabel.textContent = role === 'assistant' ? 'Assistant' : 'You';
      bubble.appendChild(roleLabel);
      const content = document.createElement('div');
      content.textContent = text;
      bubble.appendChild(content);
      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      messages.push({ role: 'user', content: text });
      send.disabled = true;

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const reply = await resp.text();
        addMessage('assistant', reply);
        messages.push({ role: 'assistant', content: reply });
      } catch (err) {
        addMessage('assistant', 'Unable to reach the API.');
        console.error(err);
      } finally {
        send.disabled = false;
      }
    }

    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
